http:
  addr: :8080
  shutdownTimeout: 20s
database:
  driver: postgres
  readWrite:
    enabled: false
    writerDsn: ""
    readerDsns: []
  maxOpenConnections: 100
  maxIdleConnections: 20
  connectionMaxLifetime: 30m
redis:
  database: 0
log:
  level: info
  format: json
id:
  workerId: 0
auth:
  accessTokenTTL: 15m
  refreshTokenTTL: 168h
  maxDevices: 5
  cookie:
    secure: true
    sameSite: lax
  corsOrigins: []
