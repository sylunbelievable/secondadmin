http:
  addr: :8080
  shutdownTimeout: 10s
database:
  driver: postgres
  readWrite:
    enabled: false
    writerDsn: ""
    readerDsns: []
  maxOpenConnections: 20
  maxIdleConnections: 5
  connectionMaxLifetime: 30m
redis:
  addr: 127.0.0.1:6379
  database: 0
log:
  level: debug
  format: console
id:
  workerId: 0
auth:
  accessTokenTTL: 15m
  refreshTokenTTL: 168h
  maxDevices: 5
  cookie:
    secure: false
    sameSite: lax
  corsOrigins:
    - http://localhost:3000
